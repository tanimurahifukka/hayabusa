<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAJIBA Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080c;
  color: #ccc;
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  height: 100vh;
}

#canvas { position: relative; width: 100%; height: 100%; }
svg#lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

/* ── Nodes ── */
.node {
  position: absolute;
  border-radius: 14px;
  padding: 14px 20px;
  text-align: center;
  z-index: 10;
  min-width: 140px;
  transition: transform 0.2s ease;
  cursor: default;
}
.node .name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.node .detail { font-size: 10px; opacity: 0.5; }
.node .indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
  background: #333;
  transition: background 0.3s, box-shadow 0.3s;
}

/* ── 点灯アニメーション（稼働中のAI） ── */
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 8px var(--glow), inset 0 0 4px var(--glow-inner); }
  50% { box-shadow: 0 0 22px var(--glow), inset 0 0 8px var(--glow-inner); }
}

/* ── 通常稼働（静かに待機） ── */
.node.alive {
  border-width: 1.5px;
}

/* ── 心拍エフェクト（処理中のみ） ── */
.node.processing {
  border-width: 2.5px;
  animation: heartbeat 1.2s ease-in-out infinite;
}

@keyframes heartbeat {
  0%   { box-shadow: 0 0 6px var(--glow); border-width: 2.5px; }
  15%  { box-shadow: 0 0 25px var(--glow), 0 0 50px var(--glow); border-width: 3.5px; }
  30%  { box-shadow: 0 0 8px var(--glow); border-width: 2.5px; }
  45%  { box-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); border-width: 3px; }
  60%  { box-shadow: 0 0 6px var(--glow); border-width: 2.5px; }
  100% { box-shadow: 0 0 6px var(--glow); border-width: 2.5px; }
}

.node.alive .indicator {
  /* 待機中は静かに光るだけ */
}
.node.processing .indicator {
  animation: dot-beat 1.2s ease-in-out infinite;
}
@keyframes dot-beat {
  0%, 60%, 100% { transform: scale(1); box-shadow: 0 0 3px var(--dot-color); }
  15% { transform: scale(1.5); box-shadow: 0 0 12px var(--dot-color), 0 0 24px var(--dot-color); }
  45% { transform: scale(1.3); box-shadow: 0 0 8px var(--dot-color), 0 0 16px var(--dot-color); }
}

/* パルスが通過した瞬間のフラッシュ */
.node.flash {
  transform: scale(1.1);
  border-width: 4px !important;
  filter: brightness(1.5);
}

/* 非表示（まだ一度も呼ばれていない） */
.node.dormant { opacity: 0; transform: scale(0.6); pointer-events: none; transition: all 0.8s ease; }

/* 待機中（呼ばれたことはあるが今は処理していない） */
.node.idle {
  opacity: 0.4;
  transform: scale(1);
  transition: all 0.8s ease;
  animation: none !important;
  border-color: #333 !important;
  box-shadow: none !important;
}
.node.idle .indicator { background: #333 !important; animation: none !important; box-shadow: none !important; }
.node.idle .name { color: #555 !important; }
.node.idle .detail { opacity: 0.3; }

/* 処理中（点灯） */
.node.alive { transition: all 0.4s ease; }

/* ── Claude ── */
.node-claude {
  background: #12121f;
  border: 1.5px solid #c0392b;
  --glow: rgba(192, 57, 43, 0.25); --glow-inner: rgba(192, 57, 43, 0.08);
  --dot-color: #e74c3c;
}
.node-claude .name { color: #e74c3c; }
.node-claude .indicator { background: #e74c3c; }

/* ── Classify ── */
.node-classify {
  background: #17140e;
  border: 1.5px solid #e67e22;
  --glow: rgba(230, 126, 34, 0.2); --glow-inner: rgba(230, 126, 34, 0.06);
  --dot-color: #f39c12;
}
.node-classify .name { color: #f39c12; }
.node-classify .indicator { background: #f39c12; }

/* ── Generalist ── */
.node-generalist {
  background: #0c1520;
  border: 1.5px solid #3498db;
  --glow: rgba(52, 152, 219, 0.25); --glow-inner: rgba(52, 152, 219, 0.08);
  --dot-color: #3498db;
}
.node-generalist .name { color: #5dade2; }
.node-generalist .indicator { background: #3498db; }

/* ── Specialist ── */
.node-specialist {
  background: #0c1a10;
  border: 1.5px solid #27ae60;
  --glow: rgba(39, 174, 96, 0.2); --glow-inner: rgba(39, 174, 96, 0.06);
  --dot-color: #2ecc71;
}
.node-specialist .name { color: #2ecc71; font-size: 13px; }
.node-specialist .indicator { background: #2ecc71; }

/* ── Lines ── */
.conn-line { stroke: #1a1a22; stroke-width: 1.5; fill: none; transition: all 0.4s ease; }
.conn-line.dormant { opacity: 0; }
.conn-line.lit { stroke-width: 2.5; }

/* ── 上下分割レイアウト ── */
#flow-area { position: relative; height: 55vh; overflow: hidden; }
#terminal-area {
  height: 45vh; display: flex; flex-direction: column;
  background: #06060a; border-top: 1px solid #1a1a22;
}

/* ── Stats Bar（フロー下部） ── */
#info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #0c0c12cc; border-top: 1px solid #1a1a22;
  padding: 6px 20px;
  display: flex; gap: 28px; align-items: center;
  font-size: 10px; z-index: 100;
}
#info .stat .value { font-size: 16px; font-weight: 700; }
#info .stat .label { font-size: 8px; opacity: 0.4; }

/* ── Terminal Panes ── */
#term-tabs {
  display: flex; gap: 0; background: #0a0a10; border-bottom: 1px solid #1a1a22;
  padding: 0 8px; flex-shrink: 0;
}
.tab {
  padding: 6px 14px; font-size: 11px; color: #555; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab.active { color: #5dade2; border-bottom-color: #3498db; }
.tab:hover { color: #888; }

#term-panes { flex: 1; overflow: hidden; position: relative; }
.term-pane {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; padding: 8px 12px;
  font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
  color: #aaa; display: none; white-space: pre-wrap; word-break: break-all;
}
.term-pane.active { display: block; }
.term-pane .prompt-line { color: #2ecc71; }
.term-pane .response-line { color: #ddd; }
.term-pane .error-line { color: #e74c3c; }
.term-pane .info-line { color: #555; }

/* ── Input Bar ── */
/* ── Input Bar（目立つデザイン） ── */
#input-bar {
  display: flex; gap: 8px; padding: 10px 14px;
  background: #0e0e18; border-top: 2px solid #3498db33; flex-shrink: 0;
}
#input-bar .input-label {
  color: #3498db; font-size: 13px; font-weight: 600; line-height: 36px;
  white-space: nowrap; padding-right: 4px;
}
#input-bar input {
  flex: 1; background: #0a0a14; border: 1.5px solid #3498db44; border-radius: 8px;
  padding: 8px 14px; color: #eee; font-family: 'SF Mono', monospace; font-size: 13px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#input-bar input:focus { border-color: #3498db; box-shadow: 0 0 12px #3498db33; }
#input-bar input::placeholder { color: #3498db44; }
#input-bar button {
  background: #3498db; border: none; border-radius: 8px;
  color: #fff; padding: 8px 20px; cursor: pointer; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
}
#input-bar button:hover { background: #2980b9; }
#input-bar button:disabled { opacity: 0.3; cursor: default; background: #333; }

/* ── Activity Log（フロー右上） ── */
#log {
  position: absolute; top: 12px; right: 12px; width: 260px; max-height: 200px;
  overflow-y: auto; background: #0a0a10dd; border: 1px solid #1a1a22;
  border-radius: 8px; padding: 8px; font-size: 9px; z-index: 100;
}
.entry { padding: 2px 0; border-bottom: 1px solid #0f0f14; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.entry .time { color: #333; }
.entry .route { color: #3498db; }
.entry .local { color: #2ecc71; }
.entry .escalate { color: #e74c3c; }

/* ── Config Panel ── */
#config-panel {
  padding: 4px; font-family: -apple-system, sans-serif; font-size: 12px;
}
.cfg-section { margin-bottom: 16px; }
.cfg-section h3 { font-size: 11px; color: #5dade2; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.cfg-table { width: 100%; border-collapse: collapse; }
.cfg-table td { padding: 5px 8px; border-bottom: 1px solid #141418; vertical-align: middle; }
.cfg-table .label { color: #666; width: 120px; font-size: 11px; }
.cfg-table .val { color: #ddd; }
.cfg-table select, .cfg-table input[type=text] {
  background: #12121a; border: 1px solid #222; border-radius: 4px;
  color: #ddd; padding: 4px 8px; font-size: 11px; width: 100%; outline: none;
}
.cfg-table select:focus, .cfg-table input[type=text]:focus { border-color: #3498db; }
.cfg-save {
  background: #2ecc7122; border: 1px solid #2ecc7144; border-radius: 5px;
  color: #2ecc71; padding: 6px 16px; cursor: pointer; font-size: 11px; margin-top: 8px;
}
.cfg-save:hover { background: #2ecc7144; }
.cfg-badge {
  display: inline-block; padding: 2px 6px; border-radius: 3px;
  font-size: 9px; margin-left: 4px;
}
.cfg-badge.online { background: #2ecc7122; color: #2ecc71; }
.cfg-badge.offline { background: #e74c3c22; color: #e74c3c; }

/* ── File Browser ── */
#file-browser { font-family: 'SF Mono', monospace; font-size: 12px; }
.fb-path {
  padding: 6px 8px; background: #0a0a14; border-bottom: 1px solid #1a1a22;
  color: #5dade2; font-size: 11px; display: flex; gap: 8px; align-items: center;
  position: sticky; top: 0;
}
.fb-path button {
  background: #1a1a22; border: 1px solid #333; border-radius: 4px;
  color: #888; padding: 2px 8px; cursor: pointer; font-size: 10px;
}
.fb-path button:hover { color: #ddd; }
.fb-item {
  padding: 4px 10px; cursor: pointer; display: flex; gap: 8px; align-items: center;
  border-bottom: 1px solid #0c0c12; transition: background 0.15s;
}
.fb-item:hover { background: #12121a; }
.fb-item .icon { width: 16px; text-align: center; font-size: 13px; }
.fb-item .name { color: #ccc; }
.fb-item.dir .name { color: #5dade2; }
.fb-code {
  padding: 10px; background: #0a0a10; font-size: 11px; line-height: 1.5;
  color: #bbb; white-space: pre-wrap; word-break: break-all;
}
.fb-code .line-num { color: #333; display: inline-block; width: 36px; text-align: right; margin-right: 12px; user-select: none; }
.fb-action-bar {
  padding: 6px 8px; background: #0c0c14; border-top: 1px solid #1a1a22;
  display: flex; gap: 6px; position: sticky; bottom: 0;
}
.fb-action-bar button {
  background: #2ecc7122; border: 1px solid #2ecc7144; border-radius: 4px;
  color: #2ecc71; padding: 4px 12px; cursor: pointer; font-size: 10px;
}
.fb-action-bar button:hover { background: #2ecc7144; }

#title { position: absolute; top: 12px; left: 16px; z-index: 100; }
#title h1 { font-size: 14px; color: #5dade2; letter-spacing: 3px; font-weight: 300; }
#title .sub { font-size: 9px; color: #333; }
</style>
</head>
<body>

<!-- ── 上: フロー可視化 ── -->
<div id="flow-area">
  <div id="title">
    <h1>KAJIBA FLOW</h1>
    <div class="sub">Real-time Orchestration</div>
  </div>
  <div id="canvas"><svg id="lines"></svg></div>
  <div id="log"><div style="color:#333;margin-bottom:4px;font-size:9px;">ACTIVITY</div></div>
  <div id="info">
    <div class="stat"><div class="value" id="s-req" style="color:#5dade2">0</div><div class="label">Requests</div></div>
    <div class="stat"><div class="value" id="s-local" style="color:#2ecc71">0</div><div class="label">Local ($0)</div></div>
    <div class="stat"><div class="value" id="s-tok" style="color:#2ecc71">0</div><div class="label">Tokens Saved</div></div>
    <div class="stat"><div class="value" id="s-cost" style="color:#f39c12">$0.00</div><div class="label">Cost Saved</div></div>
  </div>
</div>

<!-- ── 下: ターミナル ── -->
<div id="terminal-area">
  <div id="term-tabs">
    <div class="tab active" data-pane="chat">Chat</div>
    <div class="tab" data-pane="files">Files</div>
    <div class="tab" data-pane="config">Config</div>
    <div class="tab" data-pane="server">Log</div>
    <div class="tab" data-pane="events">Events</div>
  </div>
  <div id="term-panes">
    <div class="term-pane active" id="pane-chat"></div>
    <div class="term-pane" id="pane-files"><div id="file-browser"></div></div>
    <div class="term-pane" id="pane-config"><div id="config-panel"></div></div>
    <div class="term-pane" id="pane-server"></div>
    <div class="term-pane" id="pane-events"></div>
  </div>
  <div id="input-bar">
    <div class="input-label">></div>
    <input type="text" id="prompt-input" placeholder="Ask anything... (Enter)" autocomplete="off" />
    <button id="send-btn" onclick="sendPrompt()">Send</button>
  </div>
</div>

<script>
// ── Layout: 左→右のきれいなウォーターフォール ──
// x: 左端0.05 → 右端0.75
// y: 縦の中心を軸に均等配置
const NODES = [
  // Col 0 — Cloud
  { id: 'claude',    name: 'Claude Code',     detail: 'Cloud — Opus 4.6',    type: 'claude',     x: 0.05, y: 0.42 },
  // Col 1 — Classify
  { id: 'classify',  name: 'Classify',        detail: '0.6B — Router',       type: 'classify',   x: 0.25, y: 0.42 },
  // Col 2 — Generalists（上下に配置）
  { id: 'qwen',      name: 'Qwen3.5-9B',     detail: 'FIX / UI / API',      type: 'generalist', x: 0.45, y: 0.25 },
  { id: 'gemma',     name: 'Gemma 4 E4B',    detail: 'ALGO / TEST',         type: 'generalist', x: 0.45, y: 0.60 },
  // Col 3 — Specialists
  { id: 'stripe',    name: 'kajiba-stripe',   detail: 'Payment 1.7B',        type: 'specialist', x: 0.68, y: 0.10 },
  { id: 'supabase',  name: 'kajiba-supabase', detail: 'DB / RLS 1.7B',      type: 'specialist', x: 0.68, y: 0.26 },
  { id: 'orca',      name: 'kajiba-orca',     detail: 'Clinical 0.6B',       type: 'specialist', x: 0.68, y: 0.42 },
  { id: 'swift',     name: 'kajiba-swift',    detail: 'Swift/MLX 1.7B',      type: 'specialist', x: 0.68, y: 0.58 },
  { id: 'dawn',      name: 'kajiba-dawn',     detail: 'DAWN 1.7B',           type: 'specialist', x: 0.68, y: 0.74 },
];

const CONNECTIONS = [
  { from: 'claude',   to: 'classify', color: '#e67e22' },
  { from: 'classify', to: 'qwen',     color: '#3498db' },
  { from: 'classify', to: 'gemma',    color: '#3498db' },
  { from: 'qwen',     to: 'stripe',   color: '#27ae60' },
  { from: 'qwen',     to: 'supabase', color: '#27ae60' },
  { from: 'qwen',     to: 'orca',     color: '#27ae60' },
  { from: 'gemma',    to: 'swift',    color: '#27ae60' },
  { from: 'gemma',    to: 'dawn',     color: '#27ae60' },
];

let stats = { requests: 0, local: 0, escalated: 0, tokensSaved: 0, costSaved: 0 };
let nodeEls = {};
// 常時表示: Claude + Classify のみ。他は呼ばれるまで非表示。
const coreNodes = new Set(['claude', 'classify']);

// ── Render ──
function render() {
  const flowArea = document.getElementById('flow-area');
  const W = flowArea.clientWidth, H = flowArea.clientHeight - 40;
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('lines');

  // Nodes
  NODES.forEach(n => {
    const el = document.createElement('div');
    const dormant = !coreNodes.has(n.id);
    el.className = `node node-${n.type}${dormant ? ' dormant' : ' alive'}`;
    el.id = `node-${n.id}`;
    el.innerHTML = `<div><span class="indicator"></span><span class="name">${n.name}</span></div><div class="detail">${n.detail}</div>`;
    el.style.left = `${n.x * W - 70}px`;
    el.style.top = `${n.y * H - 25}px`;
    canvas.appendChild(el);
    nodeEls[n.id] = el;
  });

  // Lines (curved)
  CONNECTIONS.forEach(c => {
    const f = NODES.find(n => n.id === c.from), t = NODES.find(n => n.id === c.to);
    if (!f || !t) return;
    const x1 = f.x * W, y1 = f.y * H, x2 = t.x * W, y2 = t.y * H;
    const mx = (x1 + x2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('class', 'conn-line');
    path.setAttribute('data-from', c.from);
    path.setAttribute('data-to', c.to);
    path.style.stroke = c.color + '18';
    if (!coreNodes.has(c.to)) path.classList.add('dormant');
    svg.appendChild(path);
  });
}

// ── Pulse ──
function pulse(fromId, toId, color, dur = 700) {
  const svg = document.getElementById('lines');
  const flowArea = document.getElementById('flow-area');
  const W = flowArea.clientWidth, H = flowArea.clientHeight - 40;
  const f = NODES.find(n => n.id === fromId), t = NODES.find(n => n.id === toId);
  if (!f || !t) return;

  // Awaken & activate nodes
  [fromId, toId].forEach(id => {
    const el = nodeEls[id];
    if (!el) return;

    // 非表示だったら出現させる
    if (el.classList.contains('dormant')) {
      el.classList.remove('dormant');
      document.querySelectorAll(`path[data-from="${id}"], path[data-to="${id}"]`).forEach(p => p.classList.remove('dormant'));
    }

    // idle/awakened → alive + processing（心拍開始）
    el.classList.remove('idle', 'awakened');
    el.classList.add('alive', 'processing');

    // 心拍停止タイマー: 処理完了後に心拍を止める
    clearTimeout(el._procTimer);
    el._procTimer = setTimeout(() => {
      el.classList.remove('processing');
    }, 2000);

    // idle化タイマー: coreNodes以外は3秒後に灰色
    if (!coreNodes.has(id)) {
      clearTimeout(el._idleTimer);
      el._idleTimer = setTimeout(() => {
        el.classList.remove('alive', 'processing');
        el.classList.add('idle');
      }, 4000);
    }
  });

  // Light up line
  const line = svg.querySelector(`path[data-from="${fromId}"][data-to="${toId}"]`) ||
               svg.querySelector(`path[data-from="${toId}"][data-to="${fromId}"]`);
  if (line) { line.style.stroke = color + '66'; line.classList.add('lit'); }

  // Dot
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('r', '5');
  dot.setAttribute('fill', color);
  dot.style.filter = `drop-shadow(0 0 10px ${color})`;

  const x1 = f.x * W, y1 = f.y * H, x2 = t.x * W, y2 = t.y * H;
  const ax = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
  ax.setAttribute('attributeName', 'cx');
  ax.setAttribute('from', x1); ax.setAttribute('to', x2);
  ax.setAttribute('dur', `${dur}ms`); ax.setAttribute('fill', 'freeze');

  const ay = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
  ay.setAttribute('attributeName', 'cy');
  ay.setAttribute('from', y1); ay.setAttribute('to', y2);
  ay.setAttribute('dur', `${dur}ms`); ay.setAttribute('fill', 'freeze');

  const ar = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
  ar.setAttribute('attributeName', 'r'); ar.setAttribute('values', '4;7;4');
  ar.setAttribute('dur', `${dur}ms`);

  dot.appendChild(ax); dot.appendChild(ay); dot.appendChild(ar);
  svg.appendChild(dot);

  // Flash target node
  nodeEls[toId]?.classList.add('flash');

  setTimeout(() => {
    dot.remove();
    nodeEls[toId]?.classList.remove('flash');
    if (line) { line.style.stroke = (line.style.stroke || '').replace('66', '18'); line.classList.remove('lit'); }
  }, dur + 100);
}

// ── Log ──
function log(msg, type) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP');
  const e = document.createElement('div');
  e.className = 'entry';
  e.innerHTML = `<span class="time">${t}</span> <span class="${type}">${msg}</span>`;
  el.appendChild(e);
  el.scrollTop = el.scrollHeight;
  if (el.children.length > 40) el.children[1].remove();
}

function updateStats() {
  document.getElementById('s-req').textContent = stats.requests;
  document.getElementById('s-local').textContent = stats.local;
  document.getElementById('s-esc').textContent = stats.escalated;
  document.getElementById('s-tok').textContent = stats.tokensSaved.toLocaleString();
  document.getElementById('s-cost').textContent = `$${stats.costSaved.toFixed(4)}`;
}

// ── SSE: リアルタイムイベント受信 ──
let pending = {};

function handleEvent(ev) {
  if (ev.type === 'request') {
    pending[ev.id] = ev;
    stats.requests++;
    stats.local++;
    const p = (ev.prompt || '').substring(0, 45);
    log(`→ ${p}...`, 'route');

    // リクエスト到着パルス（即座に表示）
    pulse('claude', 'classify', '#e67e22', 400);
    setTimeout(() => pulse('classify', 'qwen', '#3498db', 350), 450);
  }

  if (ev.type === 'completion') {
    const tok = ev.total_tokens || 0;
    stats.tokensSaved += tok;
    stats.costSaved += tok * 0.000075;
    log(`✓ ${tok} tok`, 'local');

    // 結果返却パルス（即座に表示）
    pulse('qwen', 'classify', '#2ecc71', 300);
    setTimeout(() => pulse('classify', 'claude', '#2ecc71', 350), 350);
    delete pending[ev.id];
  }
  updateStats();
}

function connectSSE() {
  const es = new EventSource('/flow/stream');

  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      handleEvent(ev);
    } catch {}
  };

  es.onerror = () => {
    // 接続切れたら3秒後にリトライ
    es.close();
    log('⚠ SSE disconnected, retrying...', 'escalate');
    setTimeout(connectSSE, 3000);
  };

  log('🔌 Connected (SSE real-time)', 'route');
  // Claude Codeノードは常にalive（接続中）
  const claudeEl = nodeEls['claude'];
  if (claudeEl) { claudeEl.classList.add('alive'); }
}

// ── Terminal ──
function termWrite(paneId, text, cls = '') {
  const pane = document.getElementById(`pane-${paneId}`);
  if (!pane) return;
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = text;
  pane.appendChild(line);
  pane.scrollTop = pane.scrollHeight;
  if (pane.children.length > 500) pane.children[0].remove();
}

// Tab switching
document.addEventListener('click', (e) => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.term-pane').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`pane-${e.target.dataset.pane}`).classList.add('active');
});

// Send prompt
async function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;
  btn.textContent = '...';

  termWrite('chat', `> ${text}`, 'prompt-line');

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'local',
        messages: [{ role: 'user', content: text }],
        max_tokens: 512,
        temperature: 0,
      }),
    });
    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '(no response)';
    const tokens = data.usage?.total_tokens || 0;
    // think tag除去
    const clean = content.replace(/<think>[\s\S]*?<\/think>\s*/g, '');
    termWrite('chat', clean, 'response-line');
    termWrite('chat', `  [${tokens} tok, $0]`, 'info-line');
  } catch (e) {
    termWrite('chat', `Error: ${e.message}`, 'error-line');
  }

  btn.disabled = false;
  btn.textContent = 'Send';
  input.focus();
}

// Enter key
document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendPrompt();
});

// SSEイベントをターミナルにも表示
const origHandleEvent = handleEvent;
const origHandle = handleEvent;
const _origHandleEvent = function(ev) {
  origHandle(ev);
  // Events pane に raw JSON
  termWrite('events', JSON.stringify(ev), ev.type === 'request' ? 'route' : 'local');
  // Server log
  if (ev.type === 'request') {
    termWrite('server', `[REQ] ${ev.prompt || ''}`, 'prompt-line');
  }
  if (ev.type === 'completion') {
    termWrite('server', `[RES] ${ev.total_tokens || 0} tokens (${((ev.timestamp || 0) * 1000 % 100000).toFixed(0)}ms)`, 'response-line');
  }
};
handleEvent = _origHandleEvent;

  { id: 'orca',     label: 'Clinical (LOCAL)', genre: 'O-CLINICAL', default: 'kajiba-orca-0.6b' },

function renderConfig() {

  }).catch(() => {});

  let html = `

    <table class="cfg-table">
      <tr><td class="label">Status</td><td class="val">${serverStatus}</td></tr>
      <tr><td class="label">Endpoint</td><td class="val">${location.origin}</td></tr>

  for (const role of ROLES) {
    const opts = MODEL_OPTIONS.map(m =>
      `<option value="${m}" ${m === role.default ? 'selected' : ''}>${m}</option>`
    ).join('');
    const genreBadge = role.genre === 'O-CLINICAL'

      : `<span class="cfg-badge" style="background:#3498db11;color:#555;">${role.genre}</span>`;
    html += `
      <tr>
        <td class="label">${role.label} ${genreBadge}</td>

  }

  html += `
    </table>

  <div class="cfg-section">
    <h3>Memory Layout</h3>

      <tr><td class="label">Classify</td><td class="val">~300 MB</td></tr>
      <tr><td class="label">Qwen3.5-9B</td><td class="val">~5,000 MB</td></tr>
      <tr><td class="label">Gemma 4 E4B</td><td class="val">~4,400 MB</td></tr>
      <tr><td class="label">Specialists (×5)</td><td class="val">~3,000 MB</td></tr>
      <tr><td class="label" style="color:#5dade2;">Total</td><td class="val" style="color:#5dade2;">~12,700 MB / 96 GB</td></tr>
    </table>
  </div>

  <div class="cfg-section">
    <h3>Quick Actions</h3>
    <table class="cfg-table">
      <tr><td><button class="cfg-save" onclick="termWrite('chat','Running benchmark...','info-line')">Run Arena Bench</button></td>
          <td><button class="cfg-save" onclick="location.reload()">Reload UI</button></td></tr>
    </table>
  </div>`;

  panel.innerHTML = html;
}

function saveConfig() {
  const cfg = {};
  for (const role of ROLES) {
    const sel = document.getElementById(`cfg-${role.id}`);
    if (sel) cfg[role.id] = { model: sel.value, genre: role.genre };
  }
  // ローカルストレージに保存（サーバー再起動時に反映）
  localStorage.setItem('kajiba_config', JSON.stringify(cfg));
  termWrite('chat', 'Configuration saved (applies on next server restart)', 'info-line');

  // ノード名を更新
  for (const role of ROLES) {
    const el = nodeEls[role.id];
    if (el) {
      const detail = el.querySelector('.detail');
      const sel = document.getElementById(`cfg-${role.id}`);
      if (detail && sel) detail.textContent = sel.value.split('/').pop();
    }
  }
}

// ── File Browser ──
let currentPath = '';

async function loadDir(path) {
  currentPath = path || '';
  const fb = document.getElementById('file-browser');
  try {
    const url = path ? '/flow/files?path=' + encodeURIComponent(path) : '/flow/files';
    const r = await fetch(url);
    const data = await r.json();

    if (data.type === 'file') {
      // ファイル内容表示
      const lines = (data.content || '').split('\\n');
      const numbered = lines.map((l, i) =>
        '<span class="line-num">' + (i+1) + '</span>' + l.replace(/</g,'&lt;')
      ).join('\n');
      fb.innerHTML =
        '<div class="fb-path"><button onclick="loadDir(\'' + parentDir(data.path) + '\')">← Back</button><span>' + data.path.split('/').pop() + '</span></div>' +
        '<div class="fb-code">' + numbered + '</div>' +
        '<div class="fb-action-bar"><button onclick="askAboutFile()">Ask AI about this file</button></div>';
      return;
    }

    // ディレクトリ表示
    let html = '<div class="fb-path">';
    if (path) html += '<button onclick="loadDir(\'' + parentDir(path) + '\')">← Up</button>';
    html += '<span>' + (data.path || '.') + '</span></div>';

    const dirs = data.entries.filter(e => e.isDir);
    const files = data.entries.filter(e => !e.isDir);

    for (const d of dirs) {
      const full = (path || data.path) + '/' + d.name;
      html += '<div class="fb-item dir" onclick="loadDir(\'' + full.replace(/'/g,"\\'") + '\')"><span class="icon">📁</span><span class="name">' + d.name + '</span></div>';
    }
    for (const f of files) {
      const full = (path || data.path) + '/' + f.name;
      html += '<div class="fb-item" onclick="loadDir(\'' + full.replace(/'/g,"\\'") + '\')"><span class="icon">📄</span><span class="name">' + f.name + '</span></div>';
    }
    fb.innerHTML = html;
  } catch(e) {
    fb.innerHTML = '<div style="padding:12px;color:#e74c3c;">Error: ' + e.message + '</div>';
  }
}

function parentDir(p) {
  const parts = p.split('/');
  parts.pop();
  return parts.join('/') || '/';
}

function askAboutFile() {
  // Chatタブに切り替えてファイルについて質問
  document.querySelector('[data-pane="chat"]').click();
  const input = document.getElementById('prompt-input');
  input.value = 'Explain this file: ' + currentPath;
  input.focus();
}
